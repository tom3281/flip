<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b3d2e">
<title>FLIP - テキサスホールデム飲みゲーム</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: radial-gradient(ellipse at center, #0f5d3f 0%, #07301f 70%, #041a10 100%);
    color: #fff;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 4px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 4px);
    z-index: 0;
  }
  .app { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }
  .screen { flex: 1; display: none; flex-direction: column; padding: 20px; max-width: 720px; margin: 0 auto; width: 100%; }
  .screen.active { display: flex; }

  /* ===== Title ===== */
  .title { text-align: center; padding: 40px 20px 24px; }
  .title h1 {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: clamp(48px, 14vw, 88px);
    margin: 0;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #ffd76e 0%, #c69234 50%, #8a5a1a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    font-weight: 900;
  }
  .title .subtitle {
    font-size: 12px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
  }

  /* ===== Panels (setup) ===== */
  .card-panel {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,215,110,0.2);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }
  .card-panel h2 {
    margin: 0 0 14px 0;
    font-size: 16px;
    color: #ffd76e;
    letter-spacing: 2px;
    font-weight: 600;
  }
  .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .player-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .player-row input:focus { border-color: #ffd76e; background: rgba(255,255,255,0.12); }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .icon-btn:hover { background: rgba(255,80,80,0.4); border-color: #ff6060; }
  .add-btn {
    width: 100%;
    background: rgba(255,215,110,0.1);
    border: 1px dashed rgba(255,215,110,0.4);
    border-radius: 10px;
    padding: 12px;
    color: #ffd76e;
    font-size: 14px;
    cursor: pointer;
    margin-top: 6px;
    transition: all .2s;
  }
  .add-btn:hover { background: rgba(255,215,110,0.2); }
  .add-btn:disabled { opacity: .4; cursor: not-allowed; }

  .rule-options { display: flex; flex-direction: column; gap: 8px; }
  .rule-options label {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all .2s;
  }
  .rule-options label.active { background: rgba(255,215,110,0.15); border-color: #ffd76e; }
  .rule-options input[type="radio"] { display: none; }
  .rule-options .rule-title { font-weight: 600; font-size: 15px; }
  .rule-options .rule-desc { font-size: 12px; opacity: .7; margin-top: 2px; }
  .rule-options .rule-info { flex: 1; }

  .primary-btn {
    background: linear-gradient(180deg, #ffd76e 0%, #c69234 100%);
    color: #1a0f00;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(198,146,52,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform .1s, box-shadow .2s;
    margin-top: auto;
  }
  .primary-btn:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(198,146,52,0.4); }
  .primary-btn:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.5); }
  .ghost-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all .2s;
  }
  .ghost-btn:hover { background: rgba(255,255,255,0.08); }

  /* ===== Game ===== */
  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 4px 12px; gap: 12px;
  }
  .round-info { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.7); }
  .round-info b { color: #ffd76e; font-size: 16px; }

  .stage-banner {
    text-align: center;
    padding: 10px;
    background: linear-gradient(90deg, transparent, rgba(255,215,110,0.18), transparent);
    border-top: 1px solid rgba(255,215,110,0.3);
    border-bottom: 1px solid rgba(255,215,110,0.3);
    margin: 0 -20px 14px;
  }
  .stage-banner .label { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.6); }
  .stage-banner .name { font-size: 22px; font-weight: 700; color: #ffd76e; margin-top: 2px; letter-spacing: 4px; }

  /* Community area */
  .community-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; margin-bottom: 14px;
    padding: 16px 8px;
    background: rgba(0,0,0,0.25);
    border-radius: 14px;
    border: 1px solid rgba(255,215,110,0.15);
  }
  .community-label {
    font-size: 10px; letter-spacing: 4px; color: rgba(255,215,110,0.7);
  }
  .community-cards {
    display: flex; gap: 6px; justify-content: center;
  }
  .community-cards .card-slot {
    perspective: 800px;
  }
  .community-cards .card-slot .card { width: 62px; height: 88px; }
  .community-cards .card-slot .card .card-face { border-radius: 7px; }
  .community-cards .card-slot .card-back-emblem { font-size: 22px; }
  .community-cards .card-slot .card-front .corner .rank { font-size: 13px; }
  .community-cards .card-slot .card-front .corner .suit-mini { font-size: 11px; }
  .community-cards .card-slot .card-front .pip { font-size: 11px; }
  .community-cards .card-slot .card-front .center-pips { inset: 22% 24%; }
  .community-cards .card-slot .card-front .center-ace { font-size: 42px; }
  .community-cards .card-slot .card-front .center-face { font-size: 30px; }

  /* ===== CARD 3D base ===== */
  .card {
    position: relative;
    transform-style: preserve-3d;
    transition: transform .85s cubic-bezier(.4, 1.4, .55, 1);
    will-change: transform;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.deal-in { animation: dealIn .4s cubic-bezier(.3,1.3,.5,1); }
  @keyframes dealIn {
    from { transform: translateY(-50px) rotateZ(-12deg); opacity: 0; }
    to   { transform: translateY(0) rotateZ(0); opacity: 1; }
  }
  /* Both faces share the same border-radius / shadow / inset so back & front
     are visually identical in size/shape. */
  .card-face {
    position: absolute; inset: 0;
    border-radius: 8px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow:
      0 14px 32px rgba(0,0,0,0.62),
      0 4px 10px rgba(0,0,0,0.38),
      0 0 0 1px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }
  /* ===== CARD BACK (classic crimson with inner gold trim) ===== */
  .card-back {
    background:
      radial-gradient(circle at 50% 35%, rgba(255,200,200,0.18), transparent 60%),
      linear-gradient(135deg, #a0182a 0%, #6b0d18 55%, #3d0610 100%);
    border: 3px solid #fdfaf0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back::before {
    /* gold-tinted weave + thin frame */
    content: "";
    position: absolute; inset: 3px;
    border: 1px solid rgba(255,215,110,0.55);
    border-radius: 4px;
    background-image:
      repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,215,110,0.08) 6px 7px),
      repeating-linear-gradient(-45deg, transparent 0 6px, rgba(255,215,110,0.08) 6px 7px);
    pointer-events: none;
  }
  .card-back::after {
    content: "";
    position: absolute; inset: 6px;
    border: 0.5px solid rgba(255,215,110,0.25);
    border-radius: 2px;
    pointer-events: none;
  }
  .card-back-emblem {
    position: relative; z-index: 1;
    width: 50%; aspect-ratio: 1;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Georgia', 'Playfair Display', serif;
    font-weight: 900;
    color: #ffd76e;
    line-height: 1;
    background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.15) 60%, transparent 80%);
    box-shadow:
      inset 0 0 0 2px rgba(255,215,110,0.85),
      inset 0 0 0 3px rgba(0,0,0,0.25),
      inset 0 0 0 4px rgba(255,215,110,0.4),
      0 0 12px rgba(0,0,0,0.4);
    text-shadow:
      0 0 12px rgba(255,215,110,0.85),
      0 1px 2px rgba(0,0,0,0.65);
  }

  /* ===== CARD FRONT (classic white with pip patterns) ===== */
  .card-front {
    background: linear-gradient(180deg, #fefdf6 0%, #f6efd9 100%);
    transform: rotateY(180deg);
    color: #0a0a0a;
  }
  .card-front::before {
    /* subtle gloss highlight + thin inner edge */
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 18% 14%, rgba(255,255,255,0.5) 0%, transparent 55%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
    border-radius: inherit;
    pointer-events: none;
  }
  .card-front.red   { color: #d61e2e; }
  .card-front.black { color: #0a0a0a; }

  .corner {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    line-height: 0.82;
    font-family: 'Inter', 'Helvetica Neue', 'SF Pro Display', 'Arial Narrow', system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.05em;
    font-feature-settings: "tnum" 1, "lnum" 1;
  }
  .corner.tl { top: 5%; left: 7%; }
  .corner.br { bottom: 5%; right: 7%; transform: rotate(180deg); }
  .corner .rank { line-height: 0.82; }
  .corner .suit-mini { line-height: 1; margin-top: 0.04em; opacity: 0.95; }

  /* === Center: pip pattern (numbers 2–10) === */
  .center-pips {
    position: absolute;
    inset: 22% 24%;
    pointer-events: none;
  }
  .center-pips .pip {
    position: absolute;
    line-height: 1;
    color: inherit;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
  }

  /* === Center: large suit (Ace) === */
  .center-ace {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.18));
  }

  /* === Center: face cards (J/Q/K) === */
  .center-face {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Georgia', 'Playfair Display', 'Times New Roman', serif;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.18));
  }
  .face-letter { line-height: 0.88; }
  .face-suit {
    font-size: 0.42em;
    line-height: 1;
    opacity: 0.88;
    margin-top: 0.08em;
  }

  /* Player rows (hands) */
  .players-area {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 14px;
  }
  .player-row-game {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 8px 10px;
    gap: 10px;
    transition: all .3s;
  }
  .player-row-game.winner {
    background: rgba(255,215,110,0.18);
    border-color: #ffd76e;
    box-shadow: 0 0 20px rgba(255,215,110,0.3);
  }
  .player-row-game.loser {
    background: rgba(255,80,80,0.15);
    border-color: #ff5050;
  }
  .player-row-game.leader {
    border-color: rgba(255,215,110,0.6);
    background: rgba(255,215,110,0.06);
  }
  .player-row-game.leader .phand { color: #ffe79f; font-weight: 700; }
  .player-info {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .player-info .pname {
    font-size: 14px; font-weight: 700;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .player-info .phand {
    font-size: 11px;
    color: rgba(255,215,110,0.85);
    letter-spacing: 1px;
    min-height: 14px;
  }
  .player-row-game.loser .phand { color: #ff8a8a; }
  .hole-cards {
    display: flex; gap: 4px;
    perspective: 800px;
  }
  .hole-cards .card { width: 50px; height: 70px; }
  .hole-cards .card-face { border-radius: 5px; }
  .hole-cards .card-back-emblem { font-size: 16px; }
  .hole-cards .card-front .corner .rank { font-size: 11px; }
  .hole-cards .card-front .corner .suit-mini { font-size: 9px; }
  .hole-cards .card-front .pip { font-size: 8px; }
  .hole-cards .card-front .center-pips { inset: 24% 28%; }
  .hole-cards .card-front .center-ace { font-size: 30px; }
  .hole-cards .card-front .center-face { font-size: 22px; }

  /* Action buttons */
  .action-area {
    display: flex; justify-content: center; padding: 8px 0;
  }
  .flip-btn {
    padding: 16px 36px;
    font-size: 16px;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #ffd76e 0%, #c69234 100%);
    color: #1a0f00;
    border: none; border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(198,146,52,0.5);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .flip-btn:disabled { opacity: .4; cursor: not-allowed; animation: none; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Result overlay */
  .result-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 100;
    padding: 20px;
    animation: fadeIn .3s ease;
    overflow-y: auto;
  }
  .result-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .result-card {
    background: linear-gradient(180deg, #1a4030 0%, #0a2418 100%);
    border: 2px solid #ffd76e;
    border-radius: 20px;
    padding: 28px 22px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,110,0.3);
    animation: popIn .5s cubic-bezier(.5, 1.5, .5, 1);
  }
  @keyframes popIn {
    from { transform: scale(.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-card .label { font-size: 12px; letter-spacing: 6px; color: rgba(255,255,255,0.6); }
  .result-card .verdict { font-size: 18px; color: #ffd76e; margin: 6px 0 4px; letter-spacing: 4px; }
  .result-card .loser-name {
    font-size: 32px; font-weight: 900; color: #ff5050;
    margin: 10px 0 4px;
    text-shadow: 0 0 20px rgba(255,80,80,0.5);
    letter-spacing: 2px;
    word-break: break-all;
  }
  .result-card .loser-hand {
    font-size: 14px; color: #ff9090;
    letter-spacing: 2px; margin-bottom: 12px;
  }
  .result-card .winner-line {
    font-size: 13px; color: #ffd76e;
    margin-top: 8px; letter-spacing: 1px;
  }
  .result-card .winner-line .wname { font-weight: 700; font-size: 16px; }
  .result-card .drink-msg {
    font-size: 16px; margin: 14px 0 8px;
    color: #fff;
  }
  .result-card .drink-msg .glass { font-size: 44px; display: block; margin-bottom: 4px; }
  .result-buttons {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .result-buttons button { flex: 1; }

  /* Scoreboard */
  .scoreboard-list { display: flex; flex-direction: column; gap: 6px; }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .score-row.top { background: rgba(255,80,80,0.12); border-color: rgba(255,80,80,0.3); }
  .score-row .name { font-weight: 600; }
  .score-row .count { font-size: 14px; color: rgba(255,255,255,0.7); }
  .score-row.top .count { color: #ff7070; font-weight: 700; }

  .footer-actions { display: flex; gap: 10px; margin-top: 16px; }
  .footer-actions button { flex: 1; }

  /* Highlight cards used in winning hand */
  .card.in-hand .card-front {
    box-shadow:
      inset 0 0 0 2px #ffd76e,
      0 0 22px rgba(255,215,110,0.7),
      0 14px 32px rgba(0,0,0,0.6),
      0 4px 10px rgba(0,0,0,0.35),
      0 0 0 1px #ffd76e;
  }

  @media (max-width: 380px) {
    .community-cards .card-slot .card { width: 54px; height: 76px; }
    .community-cards .card-slot .card-front .corner .rank { font-size: 11px; }
    .community-cards .card-slot .card-front .corner .suit-mini { font-size: 9px; }
    .community-cards .card-slot .card-front .pip { font-size: 11px; }
    .community-cards .card-slot .card-front .center-ace { font-size: 36px; }
    .community-cards .card-slot .card-front .center-face { font-size: 26px; }
    .hole-cards .card { width: 44px; height: 62px; }
    .hole-cards .card-front .corner .rank { font-size: 9px; }
    .hole-cards .card-front .corner .suit-mini { font-size: 7px; }
    .hole-cards .card-front .pip { font-size: 8px; }
    .hole-cards .card-front .center-ace { font-size: 26px; }
    .hole-cards .card-front .center-face { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===== Setup Screen ===== -->
  <div class="screen active" id="setupScreen">
    <div class="title">
      <h1>FLIP</h1>
      <div class="subtitle">TEXAS HOLD'EM SHOWDOWN</div>
    </div>

    <div class="card-panel">
      <h2>プレイヤー (2-8人)</h2>
      <div id="playersList"></div>
      <button class="add-btn" id="addPlayerBtn">＋ プレイヤー追加</button>
    </div>

    <div class="card-panel">
      <h2>ルール</h2>
      <div class="rule-options" id="ruleOptions">
        <label class="active" data-rule="loser">
          <div class="rule-info">
            <div class="rule-title">最弱の役が飲む</div>
            <div class="rule-desc">一番弱いハンドのプレイヤーが飲む（定番）</div>
          </div>
        </label>
        <label data-rule="winner_picks">
          <div class="rule-info">
            <div class="rule-title">最強以外が飲む</div>
            <div class="rule-desc">勝者だけセーフ、他は全員飲む（鬼）</div>
          </div>
        </label>
      </div>
    </div>

    <button class="primary-btn" id="startBtn">DEAL</button>
  </div>

  <!-- ===== Game Screen ===== -->
  <div class="screen" id="gameScreen">
    <div class="game-header">
      <div class="round-info">ROUND <b id="roundNum">1</b></div>
      <button class="ghost-btn" id="quitBtn">終了</button>
    </div>

    <div class="stage-banner">
      <div class="label" id="stageLabel">SHOWDOWN</div>
      <div class="name" id="stageName">PRE-FLOP</div>
    </div>

    <div class="community-area">
      <div class="community-label">COMMUNITY CARDS</div>
      <div class="community-cards" id="communityCards"></div>
    </div>

    <div class="players-area" id="playersArea"></div>

    <div class="action-area">
      <button class="flip-btn" id="flipBtn">FLOP</button>
    </div>
  </div>

  <!-- ===== Result Overlay ===== -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="label">SHOWDOWN</div>
      <div class="verdict" id="resultVerdict">DRINK</div>
      <div class="loser-name" id="loserName">-</div>
      <div class="loser-hand" id="loserHand">-</div>
      <div class="drink-msg">
        <span class="glass">🍺</span>
        飲んでください！
      </div>
      <div class="winner-line" id="winnerLine"></div>
      <div class="result-buttons">
        <button class="ghost-btn" id="resultEndBtn">終了</button>
        <button class="primary-btn" style="margin: 0; padding: 14px;" id="resultNextBtn">NEXT HAND</button>
      </div>
    </div>
  </div>

  <!-- ===== Scoreboard ===== -->
  <div class="screen" id="scoreScreen">
    <div class="title" style="padding: 30px 20px 20px;">
      <h1 style="font-size: 48px;">RESULTS</h1>
      <div class="subtitle">飲んだ回数ランキング</div>
    </div>
    <div class="card-panel">
      <h2>ランキング</h2>
      <div class="scoreboard-list" id="scoreboardList"></div>
    </div>
    <div class="footer-actions">
      <button class="ghost-btn" id="rematchBtn">同じメンバーで再戦</button>
      <button class="primary-btn" style="margin: 0; padding: 14px;" id="newGameBtn">NEW GAME</button>
    </div>
  </div>

</div>

<script>
"use strict";

// ===== Card data =====
const SUITS = [
  { sym: "♠", color: "black" },
  { sym: "♥", color: "red"   },
  { sym: "♦", color: "red"   },
  { sym: "♣", color: "black" },
];
const RANKS = [
  { v: 2, label: "2" }, { v: 3, label: "3" }, { v: 4, label: "4" },
  { v: 5, label: "5" }, { v: 6, label: "6" }, { v: 7, label: "7" },
  { v: 8, label: "8" }, { v: 9, label: "9" }, { v: 10, label: "10" },
  { v: 11, label: "J" }, { v: 12, label: "Q" }, { v: 13, label: "K" },
  { v: 14, label: "A" },
];

function buildDeck() {
  const deck = [];
  for (const s of SUITS) for (const r of RANKS) deck.push({ ...r, suit: s });
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

// ===== Poker hand evaluator =====
// Returns { rank: 1..10, name: string, tiebreak: number[], usedCards: card[] }
// rank 10=Royal Flush, 9=Straight Flush, 8=Quads, 7=Full House, 6=Flush,
//      5=Straight, 4=Trips, 3=Two Pair, 2=Pair, 1=High Card
function evaluateBest5(cards) {
  // Try all C(n,5) combinations
  const combos = [];
  const n = cards.length;
  for (let a = 0; a < n - 4; a++)
    for (let b = a + 1; b < n - 3; b++)
      for (let c = b + 1; c < n - 2; c++)
        for (let d = c + 1; d < n - 1; d++)
          for (let e = d + 1; e < n; e++)
            combos.push([cards[a], cards[b], cards[c], cards[d], cards[e]]);

  let best = null;
  for (const combo of combos) {
    const ev = evaluate5(combo);
    if (!best || compareEval(ev, best) > 0) best = ev;
  }
  return best;
}

function evaluate5(cards) {
  const sorted = [...cards].sort((a, b) => b.v - a.v);
  const vals = sorted.map(c => c.v);
  const isFlush = sorted.every(c => c.suit.sym === sorted[0].suit.sym);

  // Straight detection (incl. wheel A-2-3-4-5)
  let isStraight = false;
  let straightHigh = 0;
  if (vals[0] - vals[4] === 4 && new Set(vals).size === 5) {
    isStraight = true; straightHigh = vals[0];
  } else if (vals[0] === 14 && vals[1] === 5 && vals[2] === 4 && vals[3] === 3 && vals[4] === 2) {
    isStraight = true; straightHigh = 5;
  }

  // Rank groups
  const counts = {};
  for (const c of sorted) counts[c.v] = (counts[c.v] || 0) + 1;
  const groups = Object.entries(counts)
    .map(([v, count]) => ({ v: +v, count }))
    .sort((a, b) => b.count - a.count || b.v - a.v);

  if (isStraight && isFlush) {
    if (straightHigh === 14) return { rank: 10, name: "ロイヤルフラッシュ", tiebreak: [14], usedCards: sorted };
    return { rank: 9, name: "ストレートフラッシュ", tiebreak: [straightHigh], usedCards: sorted };
  }
  if (groups[0].count === 4) {
    return { rank: 8, name: "フォーカード", tiebreak: [groups[0].v, groups[1].v], usedCards: sorted };
  }
  if (groups[0].count === 3 && groups[1].count === 2) {
    return { rank: 7, name: "フルハウス", tiebreak: [groups[0].v, groups[1].v], usedCards: sorted };
  }
  if (isFlush) {
    return { rank: 6, name: "フラッシュ", tiebreak: vals, usedCards: sorted };
  }
  if (isStraight) {
    return { rank: 5, name: "ストレート", tiebreak: [straightHigh], usedCards: sorted };
  }
  if (groups[0].count === 3) {
    const kickers = groups.filter(g => g.count === 1).map(g => g.v);
    return { rank: 4, name: "スリーカード", tiebreak: [groups[0].v, ...kickers], usedCards: sorted };
  }
  if (groups[0].count === 2 && groups[1].count === 2) {
    const kicker = groups.filter(g => g.count === 1)[0]?.v || 0;
    return { rank: 3, name: "ツーペア", tiebreak: [groups[0].v, groups[1].v, kicker], usedCards: sorted };
  }
  if (groups[0].count === 2) {
    const kickers = groups.filter(g => g.count === 1).map(g => g.v);
    return { rank: 2, name: "ワンペア", tiebreak: [groups[0].v, ...kickers], usedCards: sorted };
  }
  return { rank: 1, name: "ハイカード", tiebreak: vals, usedCards: sorted };
}

function compareEval(a, b) {
  if (a.rank !== b.rank) return a.rank - b.rank;
  for (let i = 0; i < Math.max(a.tiebreak.length, b.tiebreak.length); i++) {
    const av = a.tiebreak[i] || 0, bv = b.tiebreak[i] || 0;
    if (av !== bv) return av - bv;
  }
  return 0;
}

// ===== State =====
const STORAGE_KEY = "flip_holdem_v1";
const state = {
  players: [],     // [{name, holeCards, drinkCount, hand}]
  rule: "loser",
  round: 1,
  deck: [],
  community: [],   // 5 cards
  stage: 0,        // 0=before deal, 1=hole revealed, 2=flop, 3=turn, 4=river, 5=showdown
};

function loadSaved() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (Array.isArray(saved.players) && saved.players.length >= 2) return saved;
  } catch (e) {}
  return null;
}
function saveSetup() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      players: state.players.map(p => ({ name: p.name })),
      rule: state.rule,
    }));
  } catch (e) {}
}

// ===== Setup screen =====
const playersList = document.getElementById("playersList");
const addPlayerBtn = document.getElementById("addPlayerBtn");
const startBtn = document.getElementById("startBtn");
const ruleOptions = document.getElementById("ruleOptions");

const FUNNY_NAMES = ["酒豪", "ザル", "ベロベロ", "ほろ酔い", "下戸", "二日酔い", "顔面紅葉", "記憶喪失"];
let setupPlayers = [FUNNY_NAMES[0], FUNNY_NAMES[1]];
let setupRule = "loser";

function nextFunnyName() {
  const used = new Set(setupPlayers.map(n => n.trim()));
  return FUNNY_NAMES.find(n => !used.has(n)) || "";
}

function renderSetup() {
  playersList.innerHTML = "";
  setupPlayers.forEach((name, idx) => {
    const row = document.createElement("div");
    row.className = "player-row";
    row.innerHTML = `
      <input type="text" placeholder="プレイヤー${idx + 1}" maxlength="12" value="${escapeHtml(name)}">
      <button class="icon-btn" ${setupPlayers.length <= 2 ? "disabled style='opacity:.3;cursor:not-allowed;'" : ""}>×</button>
    `;
    const input = row.querySelector("input");
    input.addEventListener("input", e => { setupPlayers[idx] = e.target.value; updateStartBtn(); });
    const removeBtn = row.querySelector(".icon-btn");
    removeBtn.addEventListener("click", () => {
      if (setupPlayers.length > 2) {
        setupPlayers.splice(idx, 1);
        renderSetup();
      }
    });
    playersList.appendChild(row);
  });
  addPlayerBtn.disabled = setupPlayers.length >= 8;
  addPlayerBtn.textContent = setupPlayers.length >= 8 ? "（最大8人）" : "＋ プレイヤー追加";
  updateStartBtn();
}

function updateStartBtn() {
  const filled = setupPlayers.filter(n => n.trim()).length;
  startBtn.disabled = filled < 2;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

addPlayerBtn.addEventListener("click", () => {
  if (setupPlayers.length < 8) {
    setupPlayers.push(nextFunnyName());
    renderSetup();
  }
});

ruleOptions.querySelectorAll("label").forEach(label => {
  label.addEventListener("click", () => {
    ruleOptions.querySelectorAll("label").forEach(l => l.classList.remove("active"));
    label.classList.add("active");
    setupRule = label.dataset.rule;
  });
});

startBtn.addEventListener("click", () => {
  const validPlayers = setupPlayers.map(n => n.trim()).filter(n => n);
  if (validPlayers.length < 2) return;
  state.players = validPlayers.map(name => ({ name, drinkCount: 0, holeCards: [], hand: null }));
  state.rule = setupRule;
  state.round = 1;
  saveSetup();
  startHand();
  showScreen("gameScreen");
});

const saved = loadSaved();
if (saved) {
  setupPlayers = saved.players.map(p => p.name);
  if (setupPlayers.length < 2) setupPlayers = [FUNNY_NAMES[0], FUNNY_NAMES[1]];
  setupRule = saved.rule || "loser";
  ruleOptions.querySelectorAll("label").forEach(l => {
    l.classList.toggle("active", l.dataset.rule === setupRule);
  });
}
renderSetup();

// ===== Screen switching =====
const screens = ["setupScreen", "gameScreen", "scoreScreen"];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.toggle("active", s === id));
}

// ===== Game flow =====
const stageLabel = document.getElementById("stageLabel");
const stageName = document.getElementById("stageName");
const roundNumEl = document.getElementById("roundNum");
const communityCards = document.getElementById("communityCards");
const playersArea = document.getElementById("playersArea");
const flipBtn = document.getElementById("flipBtn");
const quitBtn = document.getElementById("quitBtn");

const STAGE_INFO = [
  { name: "PRE-FLOP", btn: "REVEAL" },
  { name: "POCKET", btn: "FLOP" },
  { name: "FLOP", btn: "TURN" },
  { name: "TURN", btn: "RIVER" },
  { name: "SHOWDOWN", btn: "RESULT" },
  { name: "RESULT", btn: "—" },
];

function startHand() {
  state.deck = buildDeck();
  // Hole cards are dealt now; community cards are dealt lazily as stages advance
  // so equity calculation can treat unseen community cards as truly unknown.
  for (const p of state.players) {
    p.holeCards = [state.deck.pop(), state.deck.pop()];
    p.hand = null;
  }
  state.community = [];
  state.stage = 0;
  roundNumEl.textContent = state.round;
  renderCommunityCards();
  renderPlayersArea();
  updateStageUI();
}

function updateStageUI() {
  const info = STAGE_INFO[state.stage];
  stageName.textContent = info.name;
  flipBtn.textContent = info.btn;
  flipBtn.disabled = state.stage >= 5;
  flipBtn.style.display = state.stage >= 5 ? "none" : "";
}

function renderCommunityCards() {
  communityCards.innerHTML = "";
  for (let i = 0; i < 5; i++) {
    const slot = document.createElement("div");
    slot.className = "card-slot";
    slot.innerHTML = `
      <div class="card">
        <div class="card-face card-back"></div>
        <div class="card-face card-front"></div>
      </div>
    `;
    communityCards.appendChild(slot);
  }
}

// Standard pip layouts. Coordinates are [y%, x%] inside the .center-pips container.
// Below 50% = top half (upright), above 50% = bottom half (rotated 180° to match real cards).
const PIP_LAYOUTS = {
  "2":  [[10,50],[90,50]],
  "3":  [[10,50],[50,50],[90,50]],
  "4":  [[10,30],[10,70],[90,30],[90,70]],
  "5":  [[10,30],[10,70],[50,50],[90,30],[90,70]],
  "6":  [[10,30],[10,70],[50,30],[50,70],[90,30],[90,70]],
  "7":  [[10,30],[10,70],[30,50],[50,30],[50,70],[90,30],[90,70]],
  "8":  [[10,30],[10,70],[30,50],[50,30],[50,70],[70,50],[90,30],[90,70]],
  "9":  [[10,30],[10,70],[35,30],[35,70],[50,50],[65,30],[65,70],[90,30],[90,70]],
  "10": [[10,30],[10,70],[30,30],[30,70],[50,30],[50,70],[70,30],[70,70],[90,30],[90,70]],
};

function centerHTML(card) {
  const r = card.label;
  const s = card.suit.sym;
  if (r === "A") {
    return `<div class="center-ace">${s}</div>`;
  }
  if (["J","Q","K"].includes(r)) {
    return `<div class="center-face"><span class="face-letter">${r}</span><span class="face-suit">${s}</span></div>`;
  }
  const layout = PIP_LAYOUTS[r] || [];
  const pips = layout.map(([y, x]) => {
    const rot = y > 50 ? " rotate(180deg)" : "";
    return `<span class="pip" style="top:${y}%;left:${x}%;transform:translate(-50%,-50%)${rot}">${s}</span>`;
  }).join("");
  return `<div class="center-pips">${pips}</div>`;
}

function fillCardFront(slotEl, card) {
  const front = slotEl.querySelector(".card-front");
  const colorClass = card.suit.color;
  front.className = `card-face card-front ${colorClass}`;
  front.innerHTML = `
    <div class="corner tl"><div class="rank">${card.label}</div><div class="suit-mini">${card.suit.sym}</div></div>
    ${centerHTML(card)}
    <div class="corner br"><div class="rank">${card.label}</div><div class="suit-mini">${card.suit.sym}</div></div>
  `;
}

function makeCardHTML(card, flipped) {
  const colorClass = card.suit.color;
  return `
    <div class="card ${flipped ? "flipped" : ""}">
      <div class="card-face card-back"></div>
      <div class="card-face card-front ${colorClass}">
        <div class="corner tl"><div class="rank">${card.label}</div><div class="suit-mini">${card.suit.sym}</div></div>
        ${centerHTML(card)}
        <div class="corner br"><div class="rank">${card.label}</div><div class="suit-mini">${card.suit.sym}</div></div>
      </div>
    </div>
  `;
}

function renderPlayersArea() {
  playersArea.innerHTML = "";
  state.players.forEach((p, idx) => {
    const row = document.createElement("div");
    row.className = "player-row-game";
    row.dataset.playerIdx = String(idx);
    row.innerHTML = `
      <div class="player-info">
        <div class="pname">${escapeHtml(p.name)}</div>
        <div class="phand"></div>
      </div>
      <div class="hole-cards">
        ${makeCardHTML(p.holeCards[0], false)}
        ${makeCardHTML(p.holeCards[1], false)}
      </div>
    `;
    const cards = row.querySelectorAll(".card");
    cards.forEach(c => { c.classList.add("deal-in"); });
    playersArea.appendChild(row);
  });
}

flipBtn.addEventListener("click", () => {
  if (state.stage >= 5) return;
  if (state.stage === 0) {
    revealHoleCards();
  } else if (state.stage === 1) {
    dealAndRevealCommunity(3); // flop
    setTimeout(() => displayEquity(), 700);
  } else if (state.stage === 2) {
    dealAndRevealCommunity(1); // turn
    setTimeout(() => displayEquity(), 500);
  } else if (state.stage === 3) {
    // River + immediate showdown
    dealAndRevealCommunity(1);
    setTimeout(() => clearEquity(), 500);
    showdown(); // schedules eval after river flip animation
  } else if (state.stage === 4) {
    showResultOverlay();
  }
  state.stage++;
  updateStageUI();
  // After RIVER click: keep RESULT button visible but disabled while eval runs
  if (state.stage === 4) flipBtn.disabled = true;
});

function revealHoleCards() {
  document.querySelectorAll(".player-row-game .hole-cards .card").forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("flipped");
      vibrate(20);
    }, (i % 2) * 120 + Math.floor(i / 2) * 60);
  });
}

function dealAndRevealCommunity(count) {
  const slots = communityCards.querySelectorAll(".card-slot");
  const startIdx = state.community.length;
  for (let k = 0; k < count; k++) {
    const idx = startIdx + k;
    const card = state.deck.pop();
    state.community.push(card);
    const slot = slots[idx];
    fillCardFront(slot, card);
    setTimeout(() => {
      slot.querySelector(".card").classList.add("flipped");
      vibrate(30);
    }, k * 200);
  }
}

// ===== Equity (win-rate) calculation =====
function combinations(arr, k) {
  const result = [];
  const cur = [];
  function helper(start) {
    if (cur.length === k) { result.push(cur.slice()); return; }
    for (let i = start; i <= arr.length - (k - cur.length); i++) {
      cur.push(arr[i]);
      helper(i + 1);
      cur.pop();
    }
  }
  helper(0);
  return result;
}

function calculateEquity() {
  const knownKeys = new Set();
  state.players.forEach(p => p.holeCards.forEach(c => knownKeys.add(cardKey(c))));
  state.community.forEach(c => knownKeys.add(cardKey(c)));

  const allCards = [];
  for (const s of SUITS) for (const r of RANKS) allCards.push({ ...r, suit: s });
  const available = allCards.filter(c => !knownKeys.has(cardKey(c)));

  const toCome = 5 - state.community.length;
  const known = state.community;

  const wins = state.players.map(() => 0);
  let total = 0;

  const combos = toCome === 1 ? available.map(c => [c]) : combinations(available, toCome);
  for (const combo of combos) {
    const board = known.concat(combo);
    let bestEval = null;
    const evals = state.players.map(p => evaluateBest5([...p.holeCards, ...board]));
    bestEval = evals[0];
    for (let i = 1; i < evals.length; i++) {
      if (compareEval(evals[i], bestEval) > 0) bestEval = evals[i];
    }
    const winnerIdxs = [];
    for (let i = 0; i < evals.length; i++) {
      if (compareEval(evals[i], bestEval) === 0) winnerIdxs.push(i);
    }
    const share = 1 / winnerIdxs.length;
    winnerIdxs.forEach(i => wins[i] += share);
    total++;
  }

  return wins.map(w => w / total);
}

function displayEquity() {
  const t0 = performance.now();
  const equities = calculateEquity();
  const elapsed = performance.now() - t0;
  // Find max for highlighting the leader
  let maxEq = 0;
  for (const e of equities) if (e > maxEq) maxEq = e;
  state.players.forEach((p, idx) => {
    const row = playersArea.children[idx];
    const phand = row.querySelector(".phand");
    const pct = equities[idx] * 100;
    const display = pct < 0.5 && pct > 0 ? "<1" : Math.round(pct);
    phand.textContent = `勝率 ${display}%`;
    row.classList.toggle("leader", equities[idx] === maxEq && maxEq > 0);
  });
  // (debug) console.log(`equity calc: ${elapsed.toFixed(1)}ms`);
}

function clearEquity() {
  state.players.forEach((p, idx) => {
    const row = playersArea.children[idx];
    row.querySelector(".phand").textContent = "";
    row.classList.remove("leader");
  });
}

function showdown() {
  // Wait for river flip animation, then evaluate (but don't auto-open result overlay)
  setTimeout(() => {
    state.players.forEach(p => {
      p.hand = evaluateBest5([...p.holeCards, ...state.community]);
    });
    const sorted = [...state.players].map((p, i) => ({ p, i })).sort(
      (a, b) => compareEval(b.p.hand, a.p.hand)
    );
    const bestEval = sorted[0].p.hand;
    const worstEval = sorted[sorted.length - 1].p.hand;
    const winners = sorted.filter(x => compareEval(x.p.hand, bestEval) === 0).map(x => x.i);
    const losers = sorted.filter(x => compareEval(x.p.hand, worstEval) === 0).map(x => x.i);

    document.querySelectorAll(".player-row-game").forEach((row, idx) => {
      const p = state.players[idx];
      row.classList.remove("leader");
      row.querySelector(".phand").textContent = p.hand.name;
      if (winners.includes(idx)) row.classList.add("winner");
      if (state.rule === "loser" && losers.includes(idx)) row.classList.add("loser");
      if (state.rule === "winner_picks" && !winners.includes(idx)) row.classList.add("loser");
      highlightUsedCards(row, p);
    });

    let drinkers;
    if (state.rule === "loser") drinkers = losers;
    else drinkers = state.players.map((_, i) => i).filter(i => !winners.includes(i));
    drinkers.forEach(i => state.players[i].drinkCount++);

    state._lastResult = { winners, drinkers };
    flipBtn.disabled = false;
    vibrate([60, 40, 80]);
  }, 800);
}

function showResultOverlay() {
  if (!state._lastResult) return;
  const { winners, drinkers } = state._lastResult;
  showResult(winners, drinkers);
}

function highlightUsedCards(row, player) {
  const used = new Set(player.hand.usedCards.map(cardKey));
  // hole cards
  row.querySelectorAll(".hole-cards .card").forEach((cardEl, i) => {
    if (used.has(cardKey(player.holeCards[i]))) cardEl.classList.add("in-hand");
  });
}
function cardKey(c) { return `${c.label}${c.suit.sym}`; }

function showResult(winnerIdxs, drinkerIdxs) {
  const overlay = document.getElementById("resultOverlay");
  const verdictEl = document.getElementById("resultVerdict");
  const nameEl = document.getElementById("loserName");
  const handEl = document.getElementById("loserHand");
  const winnerLineEl = document.getElementById("winnerLine");

  if (state.rule === "loser") {
    verdictEl.textContent = "最弱";
  } else {
    verdictEl.textContent = "勝者以外";
  }
  nameEl.textContent = drinkerIdxs.map(i => state.players[i].name).join(" & ");
  if (drinkerIdxs.length === 1) {
    const p = state.players[drinkerIdxs[0]];
    handEl.textContent = `${p.hand.name}`;
  } else {
    handEl.textContent = "";
  }
  const winners = winnerIdxs.map(i => state.players[i]);
  winnerLineEl.innerHTML = `WINNER: <span class="wname">${escapeHtml(winners.map(w => w.name).join(" & "))}</span> <span style="opacity:.8">(${winners[0].hand.name})</span>`;
  overlay.classList.add("active");
  vibrate([60, 40, 80]);
}

document.getElementById("resultNextBtn").addEventListener("click", () => {
  document.getElementById("resultOverlay").classList.remove("active");
  state.round++;
  startHand();
});

document.getElementById("resultEndBtn").addEventListener("click", () => {
  document.getElementById("resultOverlay").classList.remove("active");
  showScoreboard();
});

quitBtn.addEventListener("click", () => {
  if (confirm("ゲームを終了して結果を見ますか？")) showScoreboard();
});

// ===== Scoreboard =====
function showScoreboard() {
  const list = document.getElementById("scoreboardList");
  list.innerHTML = "";
  const sorted = state.players.slice().sort((a, b) => b.drinkCount - a.drinkCount);
  const max = sorted[0]?.drinkCount || 0;
  sorted.forEach(p => {
    const row = document.createElement("div");
    row.className = "score-row";
    if (p.drinkCount === max && max > 0) row.classList.add("top");
    row.innerHTML = `
      <span class="name">${escapeHtml(p.name)}</span>
      <span class="count">${p.drinkCount} 杯 ${p.drinkCount === max && max > 0 ? "🍺" : ""}</span>
    `;
    list.appendChild(row);
  });
  showScreen("scoreScreen");
}

document.getElementById("rematchBtn").addEventListener("click", () => {
  state.players.forEach(p => p.drinkCount = 0);
  state.round = 1;
  startHand();
  showScreen("gameScreen");
});

document.getElementById("newGameBtn").addEventListener("click", () => {
  showScreen("setupScreen");
});

function vibrate(pattern) {
  if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
}

document.addEventListener("gesturestart", e => e.preventDefault());
</script>
</body>
</html>
